name: build-check

on:
  push:
    branches: [main]
  pull_request:

jobs:
  generated-files-up-to-date:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Rebuild agent layers from canonical sources
        run: python3 scripts/build.py
      - name: Fail if generated files drifted from what is committed
        run: |
          if ! git diff --quiet -- claude-plugin/ gemini-extension/; then
            echo "::error::claude-plugin/ or gemini-extension/ are out of date with skills/ and commands/."
            echo "Run 'python3 scripts/build.py' locally and commit the result."
            echo "Or enable the pre-commit hook: git config core.hooksPath .githooks"
            echo
            echo "Drift:"
            git --no-pager diff -- claude-plugin/ gemini-extension/
            exit 1
          fi
